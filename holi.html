<!DOCTYPE html>
<html>
<head>
<title>Happy Holi Deepak</title>
<style>
body {
  margin: 0;
  text-align: center;
  overflow: hidden;
  background: linear-gradient(to right, pink, yellow);
  font-family: Arial, sans-serif;
}

h1 {
  margin-top: 100px;
  font-size: 50px;
  color: white;
  text-shadow: 2px 2px 5px black;
}

button {
  padding: 12px 25px;
  font-size: 20px;
  cursor: pointer;
  border: none;
  border-radius: 25px;
  background: white;
}

.color {
  position: absolute;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  animation: fall 3s linear infinite;
}

@keyframes fall {
  from { top: -20px; }
  to { top: 100vh; }
}
</style>
</head>

<body>

<h1>🌸 Happy Holi Deepak 🌸</h1>
<button onclick="playHoli()">Play Holi 🎉</button>

<audio id="music" src="song.m4a"></audio>

<script>
function playHoli() {
  document.getElementById("music").play();

  for (let i = 0; i < 50; i++) {
    let div = document.createElement("div");
    div.classList.add("color");
    div.style.left = Math.random() * window.innerWidth + "px";
    div.style.backgroundColor =
      ["red","blue","green","yellow","pink","orange"][Math.floor(Math.random()*6)];
    div.style.animationDuration = (Math.random()*3+2)+"s";
    document.body.appendChild(div);
  }
}
</script>

</body>
</html>
